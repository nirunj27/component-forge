services:
  - type: web
    name: component-forge-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --frozen-lockfile && pnpm run build:render
    startCommand: pnpm run start:api
    healthCheckPath: /api/registry/components
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
