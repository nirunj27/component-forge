# Component Forge — Nginx site (Playground + Studio + API proxy)
# Install: sudo cp component-forge.conf /etc/nginx/sites-available/component-forge
#          sudo ln -sf /etc/nginx/sites-available/component-forge /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    # API → Node (PM2)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # json-server mock routes (categories, tokens, stats)
    location ~ ^/(categories|tokens|stats)(/|$) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Studio SPA
    location /studio/ {
        alias /opt/component-forge/apps/studio/dist/;
        try_files $uri $uri/ /studio/index.html;
    }

    location = /studio {
        return 301 /studio/;
    }

    # Playground SPA
    location / {
        root /opt/component-forge/apps/playground/dist;
        try_files $uri $uri/ /index.html;
    }
}
