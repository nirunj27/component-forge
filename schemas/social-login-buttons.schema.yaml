name: SocialLoginButtons
description: OAuth provider buttons
category: authentication
props:
  variant:
    type: enum
    values:
      - primary
      - secondary
      - ghost
      - danger
    default: primary
    description: Visual style
  size:
    type: enum
    values:
      - sm
      - md
      - lg
    default: md
  disabled:
    type: boolean
    default: false
  loading:
    type: boolean
    default: false
slots:
  - name: children
    required: false
    description: Button label
events:
  - onClick
a11y:
  role: button
  keyboard:
    - Enter
    - Space
