name: NumberInput
description: Numeric input with steppers
category: forms
props:
  label:
    type: string
    description: Field label
  value:
    type: string
    default: ""
  placeholder:
    type: string
    default: ""
  disabled:
    type: boolean
    default: false
  required:
    type: boolean
    default: false
  error:
    type: string
    description: Validation error message
events:
  - onChange
  - onBlur
a11y:
  role: textbox
  keyboard:
    - Tab
