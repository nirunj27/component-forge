name: Divider
description: Visual separator line
category: layout
props:
  variant:
    type: enum
    values:
      - default
      - compact
      - spacious
    default: default
  gap:
    type: enum
    values:
      - sm
      - md
      - lg
    default: md
slots:
  - name: children
    required: true
    description: Layout content
a11y:
  role: region
