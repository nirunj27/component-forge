name: KanbanBoard
description: Drag-and-drop kanban board
category: advanced
props:
  value:
    type: string
    default: ""
  readOnly:
    type: boolean
    default: false
  height:
    type: number
    default: 320
    description: Editor height in px
slots:
  - name: children
    required: false
events:
  - onChange
a11y:
  role: textbox
